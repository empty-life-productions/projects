services:
  - type: web
    name: the-dugout
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dugout-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: dugout-redis
          property: connectionString
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=450

databases:
  - name: dugout-db
    plan: free

redis:
  - name: dugout-redis
    plan: free
    ipAllowList: [] # Only allow internal connections
